<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" width="1000" height="800">
  <defs>
    <radialGradient id="jarvisGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#d4bc9a"/>
      <stop offset="100%" stop-color="#c4a882"/>
    </radialGradient>
    <radialGradient id="chiefGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#9db8ab"/>
      <stop offset="100%" stop-color="#7c9e8f"/>
    </radialGradient>
    <radialGradient id="memberGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#c8ddd3"/>
      <stop offset="100%" stop-color="#b8cfc4"/>
    </radialGradient>
    <filter id="jarvisGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feFlood flood-color="#c4a882" flood-opacity="0.3"/>
      <feComposite in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="squadShadow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#7c9e8f" flood-opacity="0.08"/>
      <feComposite in2="blur" operator="in" result="shadow"/>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .label { font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif; }
      .squad-line { stroke: #c4a882; stroke-width: 2; stroke-dasharray: none; opacity: 0.6; }
      .cross-line { stroke: #e0dcd5; stroke-width: 1; stroke-dasharray: 6,4; opacity: 0.4; }
      .internal-line { stroke: #c8ddd3; stroke-width: 1.5; opacity: 0.6; }
    </style>
  </defs>

  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" class="label" font-size="20" font-weight="700" fill="#1a1a1a" letter-spacing="-0.02em">Arquitetura de Squads — Orquestração J.A.R.V.I.S.</text>
  <text x="500" y="58" text-anchor="middle" class="label" font-size="13" fill="#666666">Cada squad opera como unidade autônoma. O orquestrador fala apenas com os chiefs.</text>

  <!-- Cross-squad dotted lines -->
  <line x1="230" y1="240" x2="420" y2="540" class="cross-line"/>
  <line x1="770" y1="240" x2="580" y2="540" class="cross-line"/>
  <line x1="180" y1="440" x2="420" y2="540" class="cross-line"/>

  <!-- Lines from JARVIS to each squad chief -->
  <line x1="500" y1="175" x2="230" y2="230" class="squad-line"/>
  <line x1="500" y1="175" x2="500" y2="260" class="squad-line"/>
  <line x1="500" y1="175" x2="770" y2="230" class="squad-line"/>
  <line x1="500" y1="175" x2="180" y2="420" class="squad-line"/>
  <line x1="500" y1="175" x2="820" y2="420" class="squad-line"/>
  <line x1="500" y1="175" x2="280" y2="600" class="squad-line"/>
  <line x1="500" y1="175" x2="500" y2="580" class="squad-line"/>
  <line x1="500" y1="175" x2="720" y2="600" class="squad-line"/>

  <!-- ===== JARVIS (Center) ===== -->
  <circle cx="500" cy="155" r="38" fill="url(#jarvisGrad)" filter="url(#jarvisGlow)" stroke="#c4a882" stroke-width="2" stroke-opacity="0.4"/>
  <text x="500" y="148" text-anchor="middle" class="label" font-size="10" font-weight="800" fill="#5c4a30" letter-spacing="0.05em">J.A.R.V.I.S.</text>
  <text x="500" y="162" text-anchor="middle" class="label" font-size="8" fill="#6b5838" opacity="0.8">Orchestrator</text>

  <!-- ===== Squad 1: Dev Squad (top-left) ===== -->
  <g filter="url(#squadShadow)">
    <rect x="150" y="195" width="160" height="120" rx="12" fill="white" stroke="#e0dcd5" stroke-width="1"/>
    <text x="230" y="215" text-anchor="middle" class="label" font-size="11" font-weight="700" fill="#8b7355">Dev Squad</text>
    <circle cx="230" cy="245" r="12" fill="url(#chiefGrad)"/>
    <text x="230" y="249" text-anchor="middle" class="label" font-size="7" fill="white" font-weight="700">C</text>
    <circle cx="195" cy="280" r="9" fill="url(#memberGrad)"/>
    <circle cx="225" cy="285" r="9" fill="url(#memberGrad)"/>
    <circle cx="255" cy="280" r="9" fill="url(#memberGrad)"/>
    <line x1="230" y1="257" x2="195" y2="271" class="internal-line"/>
    <line x1="230" y1="257" x2="225" y2="276" class="internal-line"/>
    <line x1="230" y1="257" x2="255" y2="271" class="internal-line"/>
    <line x1="195" y1="280" x2="225" y2="285" class="internal-line"/>
    <line x1="225" y1="285" x2="255" y2="280" class="internal-line"/>
  </g>

  <!-- ===== Squad 2: Design Squad (top-center) ===== -->
  <g filter="url(#squadShadow)">
    <rect x="420" y="235" width="160" height="120" rx="12" fill="white" stroke="#e0dcd5" stroke-width="1"/>
    <text x="500" y="255" text-anchor="middle" class="label" font-size="11" font-weight="700" fill="#6b8577">Design Squad</text>
    <circle cx="500" cy="280" r="12" fill="url(#chiefGrad)"/>
    <text x="500" y="284" text-anchor="middle" class="label" font-size="7" fill="white" font-weight="700">C</text>
    <circle cx="465" cy="320" r="9" fill="url(#memberGrad)"/>
    <circle cx="500" cy="325" r="9" fill="url(#memberGrad)"/>
    <circle cx="535" cy="320" r="9" fill="url(#memberGrad)"/>
    <line x1="500" y1="292" x2="465" y2="311" class="internal-line"/>
    <line x1="500" y1="292" x2="500" y2="316" class="internal-line"/>
    <line x1="500" y1="292" x2="535" y2="311" class="internal-line"/>
    <line x1="465" y1="320" x2="500" y2="325" class="internal-line"/>
    <line x1="500" y1="325" x2="535" y2="320" class="internal-line"/>
  </g>

  <!-- ===== Squad 3: Advisory Board (top-right) ===== -->
  <g filter="url(#squadShadow)">
    <rect x="690" y="195" width="160" height="120" rx="12" fill="white" stroke="#e0dcd5" stroke-width="1"/>
    <text x="770" y="215" text-anchor="middle" class="label" font-size="11" font-weight="700" fill="#5a7a6b">Advisory Board</text>
    <circle cx="770" cy="245" r="12" fill="url(#chiefGrad)"/>
    <text x="770" y="249" text-anchor="middle" class="label" font-size="7" fill="white" font-weight="700">C</text>
    <circle cx="730" cy="278" r="9" fill="url(#memberGrad)"/>
    <circle cx="755" cy="286" r="9" fill="url(#memberGrad)"/>
    <circle cx="785" cy="286" r="9" fill="url(#memberGrad)"/>
    <circle cx="810" cy="278" r="9" fill="url(#memberGrad)"/>
    <line x1="770" y1="257" x2="730" y2="270" class="internal-line"/>
    <line x1="770" y1="257" x2="755" y2="278" class="internal-line"/>
    <line x1="770" y1="257" x2="785" y2="278" class="internal-line"/>
    <line x1="770" y1="257" x2="810" y2="270" class="internal-line"/>
  </g>

  <!-- ===== Squad 4: Copy Squad (mid-left) ===== -->
  <g filter="url(#squadShadow)">
    <rect x="100" y="385" width="160" height="130" rx="12" fill="white" stroke="#e0dcd5" stroke-width="1"/>
    <text x="180" y="405" text-anchor="middle" class="label" font-size="11" font-weight="700" fill="#a37858">Copy Squad</text>
    <circle cx="180" cy="435" r="12" fill="url(#chiefGrad)"/>
    <text x="180" y="439" text-anchor="middle" class="label" font-size="7" fill="white" font-weight="700">C</text>
    <circle cx="135" cy="470" r="9" fill="url(#memberGrad)"/>
    <circle cx="160" cy="480" r="9" fill="url(#memberGrad)"/>
    <circle cx="185" cy="483" r="9" fill="url(#memberGrad)"/>
    <circle cx="210" cy="478" r="9" fill="url(#memberGrad)"/>
    <circle cx="230" cy="465" r="9" fill="url(#memberGrad)"/>
    <line x1="180" y1="447" x2="135" y2="462" class="internal-line"/>
    <line x1="180" y1="447" x2="160" y2="472" class="internal-line"/>
    <line x1="180" y1="447" x2="185" y2="474" class="internal-line"/>
    <line x1="180" y1="447" x2="210" y2="470" class="internal-line"/>
    <line x1="180" y1="447" x2="230" y2="457" class="internal-line"/>
  </g>

  <!-- ===== Squad 5: Hormozi (mid-right) ===== -->
  <g filter="url(#squadShadow)">
    <rect x="740" y="385" width="160" height="120" rx="12" fill="white" stroke="#e0dcd5" stroke-width="1"/>
    <text x="820" y="405" text-anchor="middle" class="label" font-size="11" font-weight="700" fill="#b89570">Hormozi $100M</text>
    <circle cx="820" cy="435" r="12" fill="url(#chiefGrad)"/>
    <text x="820" y="439" text-anchor="middle" class="label" font-size="7" fill="white" font-weight="700">C</text>
    <circle cx="785" cy="470" r="9" fill="url(#memberGrad)"/>
    <circle cx="815" cy="475" r="9" fill="url(#memberGrad)"/>
    <circle cx="845" cy="472" r="9" fill="url(#memberGrad)"/>
    <circle cx="870" cy="460" r="9" fill="url(#memberGrad)"/>
    <line x1="820" y1="447" x2="785" y2="462" class="internal-line"/>
    <line x1="820" y1="447" x2="815" y2="466" class="internal-line"/>
    <line x1="820" y1="447" x2="845" y2="464" class="internal-line"/>
    <line x1="820" y1="447" x2="870" y2="452" class="internal-line"/>
  </g>

  <!-- ===== Squad 6: Finance (bottom-left) ===== -->
  <g filter="url(#squadShadow)">
    <rect x="200" y="565" width="160" height="110" rx="12" fill="white" stroke="#e0dcd5" stroke-width="1"/>
    <text x="280" y="585" text-anchor="middle" class="label" font-size="11" font-weight="700" fill="#7c9e8f">Finance Squad</text>
    <circle cx="280" cy="610" r="12" fill="url(#chiefGrad)"/>
    <text x="280" y="614" text-anchor="middle" class="label" font-size="7" fill="white" font-weight="700">C</text>
    <circle cx="250" cy="645" r="9" fill="url(#memberGrad)"/>
    <circle cx="280" cy="648" r="9" fill="url(#memberGrad)"/>
    <circle cx="310" cy="645" r="9" fill="url(#memberGrad)"/>
    <line x1="280" y1="622" x2="250" y2="637" class="internal-line"/>
    <line x1="280" y1="622" x2="280" y2="639" class="internal-line"/>
    <line x1="280" y1="622" x2="310" y2="637" class="internal-line"/>
  </g>

  <!-- ===== Squad 7: Market Intel (bottom-center) ===== -->
  <g filter="url(#squadShadow)">
    <rect x="420" y="555" width="160" height="115" rx="12" fill="white" stroke="#e0dcd5" stroke-width="1"/>
    <text x="500" y="575" text-anchor="middle" class="label" font-size="11" font-weight="700" fill="#9e8868">Market Intel</text>
    <circle cx="500" cy="600" r="12" fill="url(#chiefGrad)"/>
    <text x="500" y="604" text-anchor="middle" class="label" font-size="7" fill="white" font-weight="700">C</text>
    <circle cx="460" cy="635" r="9" fill="url(#memberGrad)"/>
    <circle cx="490" cy="640" r="9" fill="url(#memberGrad)"/>
    <circle cx="520" cy="638" r="9" fill="url(#memberGrad)"/>
    <circle cx="545" cy="630" r="9" fill="url(#memberGrad)"/>
    <line x1="500" y1="612" x2="460" y2="627" class="internal-line"/>
    <line x1="500" y1="612" x2="490" y2="632" class="internal-line"/>
    <line x1="500" y1="612" x2="520" y2="630" class="internal-line"/>
    <line x1="500" y1="612" x2="545" y2="622" class="internal-line"/>
  </g>

  <!-- ===== Squad 8: Agro Intel (bottom-right) ===== -->
  <g filter="url(#squadShadow)">
    <rect x="640" y="565" width="160" height="110" rx="12" fill="white" stroke="#e0dcd5" stroke-width="1"/>
    <text x="720" y="585" text-anchor="middle" class="label" font-size="11" font-weight="700" fill="#5a7a6b">Agro Intel</text>
    <circle cx="720" cy="610" r="12" fill="url(#chiefGrad)"/>
    <text x="720" y="614" text-anchor="middle" class="label" font-size="7" fill="white" font-weight="700">C</text>
    <circle cx="690" cy="645" r="9" fill="url(#memberGrad)"/>
    <circle cx="720" cy="648" r="9" fill="url(#memberGrad)"/>
    <circle cx="750" cy="645" r="9" fill="url(#memberGrad)"/>
    <line x1="720" y1="622" x2="690" y2="637" class="internal-line"/>
    <line x1="720" y1="622" x2="720" y2="639" class="internal-line"/>
    <line x1="720" y1="622" x2="750" y2="637" class="internal-line"/>
  </g>

  <!-- Legend -->
  <g transform="translate(50, 720)">
    <rect x="0" y="0" width="900" height="60" rx="10" fill="#f8f6f3" stroke="#e0dcd5" stroke-width="1"/>

    <circle cx="30" cy="22" r="8" fill="url(#jarvisGrad)"/>
    <text x="44" y="26" class="label" font-size="11" fill="#666666">Orquestrador</text>

    <line x1="130" y1="22" x2="155" y2="22" stroke="#c4a882" stroke-width="2" opacity="0.6"/>
    <text x="162" y="26" class="label" font-size="11" fill="#666666">Rota para Chief</text>

    <circle cx="280" cy="22" r="8" fill="url(#chiefGrad)"/>
    <text x="292" y="18" class="label" font-size="7" fill="white" font-weight="700">C</text>
    <text x="302" y="26" class="label" font-size="11" fill="#666666">Squad Chief</text>

    <circle cx="400" cy="22" r="6" fill="url(#memberGrad)"/>
    <text x="412" y="26" class="label" font-size="11" fill="#666666">Membro</text>

    <line x1="478" y1="22" x2="508" y2="22" class="internal-line"/>
    <text x="515" y="26" class="label" font-size="11" fill="#666666">Colaboração interna</text>

    <line x1="640" y1="22" x2="670" y2="22" class="cross-line" opacity="0.8"/>
    <text x="677" y="26" class="label" font-size="11" fill="#666666">Cross-squad (raro)</text>

    <text x="450" y="50" text-anchor="middle" class="label" font-size="12" font-weight="700" fill="#1a1a1a">160+ agentes. Nunca mais que 5 ativos por tarefa.</text>
  </g>

  <!-- "+" indicators showing there are more squads -->
  <text x="90" y="650" text-anchor="middle" class="label" font-size="28" font-weight="300" fill="#d8d2c8">+18</text>
  <text x="90" y="670" text-anchor="middle" class="label" font-size="10" fill="#888888">squads</text>
</svg>