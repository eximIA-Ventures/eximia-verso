<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <radialGradient id="nodeGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#d4bc9a"/>
      <stop offset="100%" stop-color="#c4a882"/>
    </radialGradient>
    <radialGradient id="nodeGradGreen" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#a3c4b5"/>
      <stop offset="100%" stop-color="#7c9e8f"/>
    </radialGradient>
    <filter id="greenGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="greenGlowBg">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feFlood flood-color="#7c9e8f" flood-opacity="0.12" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feComposite in="SourceGraphic" in2="glow" operator="over"/>
    </filter>
    <style>
      .label { font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif; fill: #1a1a1a; }
      .conn-line { stroke: #d8d2c8; stroke-width: 2; stroke-linecap: round; }
      .conn-line-chaos { stroke: #d8d2c8; stroke-width: 1.5; stroke-linecap: round; }
      .conn-line-green { stroke: #a3c4b5; stroke-width: 2.5; stroke-linecap: round; }
    </style>
  </defs>

  <!-- Group 1: 2 people = 1 connection -->
  <g transform="translate(80, 160)">
    <line x1="-30" y1="0" x2="30" y2="0" class="conn-line"/>
    <circle cx="-30" cy="0" r="22" fill="url(#nodeGrad)"/>
    <circle cx="30" cy="0" r="22" fill="url(#nodeGrad)"/>
    <text x="0" y="90" text-anchor="middle" class="label" font-size="15" font-weight="600">2 pessoas</text>
    <text x="0" y="112" text-anchor="middle" class="label" font-size="13" opacity="0.7">1 conexão</text>
  </g>

  <!-- Group 2: 3 people = 3 connections (SWEET SPOT - sage green glow) -->
  <g transform="translate(300, 160)">
    <circle cx="0" cy="0" r="80" fill="#7c9e8f" opacity="0.06"/>
    <circle cx="0" cy="0" r="60" fill="#7c9e8f" opacity="0.04"/>
    <line x1="0" y1="-35" x2="-30" y2="20" class="conn-line-green"/>
    <line x1="0" y1="-35" x2="30" y2="20" class="conn-line-green"/>
    <line x1="-30" y1="20" x2="30" y2="20" class="conn-line-green"/>
    <circle cx="0" cy="-35" r="20" fill="url(#nodeGradGreen)" filter="url(#greenGlow)"/>
    <circle cx="-30" cy="20" r="20" fill="url(#nodeGradGreen)" filter="url(#greenGlow)"/>
    <circle cx="30" cy="20" r="20" fill="url(#nodeGradGreen)" filter="url(#greenGlow)"/>
    <rect x="-38" y="52" width="76" height="22" rx="11" fill="#7c9e8f" opacity="0.15"/>
    <text x="0" y="67" text-anchor="middle" class="label" font-size="11" font-weight="700" fill="#5a7a6b">SWEET SPOT</text>
    <text x="0" y="100" text-anchor="middle" class="label" font-size="15" font-weight="600">3 pessoas</text>
    <text x="0" y="122" text-anchor="middle" class="label" font-size="13" opacity="0.7">3 conexões</text>
  </g>

  <!-- Group 3: 4 people = 6 connections -->
  <g transform="translate(530, 160)">
    <line x1="-28" y1="-28" x2="28" y2="-28" class="conn-line"/>
    <line x1="-28" y1="-28" x2="-28" y2="28" class="conn-line"/>
    <line x1="-28" y1="-28" x2="28" y2="28" class="conn-line"/>
    <line x1="28" y1="-28" x2="-28" y2="28" class="conn-line"/>
    <line x1="28" y1="-28" x2="28" y2="28" class="conn-line"/>
    <line x1="-28" y1="28" x2="28" y2="28" class="conn-line"/>
    <circle cx="-28" cy="-28" r="17" fill="url(#nodeGrad)"/>
    <circle cx="28" cy="-28" r="17" fill="url(#nodeGrad)"/>
    <circle cx="-28" cy="28" r="17" fill="url(#nodeGrad)"/>
    <circle cx="28" cy="28" r="17" fill="url(#nodeGrad)"/>
    <text x="0" y="100" text-anchor="middle" class="label" font-size="15" font-weight="600">4 pessoas</text>
    <text x="0" y="122" text-anchor="middle" class="label" font-size="13" opacity="0.7">6 conexões</text>
  </g>

  <!-- Group 4: 5 people = 10 connections -->
  <g transform="translate(770, 160)">
    <line x1="0" y1="-40" x2="38" y2="-12" class="conn-line-chaos"/>
    <line x1="0" y1="-40" x2="24" y2="32" class="conn-line-chaos"/>
    <line x1="0" y1="-40" x2="-24" y2="32" class="conn-line-chaos"/>
    <line x1="0" y1="-40" x2="-38" y2="-12" class="conn-line-chaos"/>
    <line x1="38" y1="-12" x2="24" y2="32" class="conn-line-chaos"/>
    <line x1="38" y1="-12" x2="-24" y2="32" class="conn-line-chaos"/>
    <line x1="38" y1="-12" x2="-38" y2="-12" class="conn-line-chaos"/>
    <line x1="24" y1="32" x2="-24" y2="32" class="conn-line-chaos"/>
    <line x1="24" y1="32" x2="-38" y2="-12" class="conn-line-chaos"/>
    <line x1="-24" y1="32" x2="-38" y2="-12" class="conn-line-chaos"/>
    <circle cx="0" cy="-40" r="15" fill="url(#nodeGrad)"/>
    <circle cx="38" cy="-12" r="15" fill="url(#nodeGrad)"/>
    <circle cx="24" cy="32" r="15" fill="url(#nodeGrad)"/>
    <circle cx="-24" cy="32" r="15" fill="url(#nodeGrad)"/>
    <circle cx="-38" cy="-12" r="15" fill="url(#nodeGrad)"/>
    <text x="0" y="100" text-anchor="middle" class="label" font-size="15" font-weight="600">5 pessoas</text>
    <text x="0" y="122" text-anchor="middle" class="label" font-size="13" opacity="0.7">10 conexões</text>
  </g>

  <!-- Group 5: 6 people = 15 connections (CHAOS) -->
  <g transform="translate(1020, 160)">
    <line x1="0" y1="-42" x2="36" y2="-21" stroke="#d8d2c8" stroke-width="1.2" opacity="0.8"/>
    <line x1="0" y1="-42" x2="36" y2="21" stroke="#d8d2c8" stroke-width="1.2" opacity="0.8"/>
    <line x1="0" y1="-42" x2="0" y2="42" stroke="#d8d2c8" stroke-width="1.2" opacity="0.8"/>
    <line x1="0" y1="-42" x2="-36" y2="21" stroke="#d8d2c8" stroke-width="1.2" opacity="0.8"/>
    <line x1="0" y1="-42" x2="-36" y2="-21" stroke="#d8d2c8" stroke-width="1.2" opacity="0.8"/>
    <line x1="36" y1="-21" x2="36" y2="21" stroke="#d8d2c8" stroke-width="1.2" opacity="0.8"/>
    <line x1="36" y1="-21" x2="0" y2="42" stroke="#d8d2c8" stroke-width="1.2" opacity="0.8"/>
    <line x1="36" y1="-21" x2="-36" y2="21" stroke="#d8d2c8" stroke-width="1.2" opacity="0.8"/>
    <line x1="36" y1="-21" x2="-36" y2="-21" stroke="#d8d2c8" stroke-width="1.2" opacity="0.8"/>
    <line x1="36" y1="21" x2="0" y2="42" stroke="#d8d2c8" stroke-width="1.2" opacity="0.8"/>
    <line x1="36" y1="21" x2="-36" y2="21" stroke="#d8d2c8" stroke-width="1.2" opacity="0.8"/>
    <line x1="36" y1="21" x2="-36" y2="-21" stroke="#d8d2c8" stroke-width="1.2" opacity="0.8"/>
    <line x1="0" y1="42" x2="-36" y2="21" stroke="#d8d2c8" stroke-width="1.2" opacity="0.8"/>
    <line x1="0" y1="42" x2="-36" y2="-21" stroke="#d8d2c8" stroke-width="1.2" opacity="0.8"/>
    <line x1="-36" y1="21" x2="-36" y2="-21" stroke="#d8d2c8" stroke-width="1.2" opacity="0.8"/>
    <circle cx="0" cy="-42" r="13" fill="url(#nodeGrad)"/>
    <circle cx="36" cy="-21" r="13" fill="url(#nodeGrad)"/>
    <circle cx="36" cy="21" r="13" fill="url(#nodeGrad)"/>
    <circle cx="0" cy="42" r="13" fill="url(#nodeGrad)"/>
    <circle cx="-36" cy="21" r="13" fill="url(#nodeGrad)"/>
    <circle cx="-36" cy="-21" r="13" fill="url(#nodeGrad)"/>
    <text x="0" y="110" text-anchor="middle" class="label" font-size="15" font-weight="600">6 pessoas</text>
    <text x="0" y="132" text-anchor="middle" class="label" font-size="13" opacity="0.7">15 conexões</text>
  </g>

  <!-- Progression arrows -->
  <g opacity="0.3">
    <path d="M145,160 L195,160" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M380,160 L430,160" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M610,160 L660,160" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
    <path d="M855,160 L905,160" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arrowhead)"/>
  </g>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#1a1a1a" stroke-width="1.2"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="35" text-anchor="middle" class="label" font-size="20" font-weight="700" letter-spacing="-0.02em">Evolução das Conexões em Equipes</text>
  <text x="600" y="56" text-anchor="middle" class="label" font-size="13" opacity="0.5">Cada nova pessoa adiciona uma conexão com TODOS os outros membros</text>

  <!-- Bottom annotation -->
  <text x="600" y="375" text-anchor="middle" class="label" font-size="12" opacity="0.4">Fórmula: n(n-1)/2 conexões</text>
</svg>