<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <style>
      .label { font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif; }
    </style>
  </defs>

  <!-- Title -->
  <text x="400" y="40" text-anchor="middle" class="label" font-size="22" font-weight="700" fill="#1a1a1a" letter-spacing="-0.02em">Camadas Sociais de Dunbar</text>
  <text x="400" y="62" text-anchor="middle" class="label" font-size="13" fill="#666666">Cada camada se multiplica por ~3 a partir do centro</text>

  <!-- Concentric circles (outermost to innermost) -->
  <!-- Layer 5: 500 - Rostos Conhecidos -->
  <circle cx="400" cy="420" r="340" fill="#c4a882" opacity="0.06" stroke="#c4a882" stroke-width="1.5" stroke-opacity="0.15"/>

  <!-- Layer 4: 150 - Conhecidos Estáveis -->
  <circle cx="400" cy="420" r="270" fill="#c4a882" opacity="0.10" stroke="#c4a882" stroke-width="1.5" stroke-opacity="0.2"/>

  <!-- Layer 3: 50 - Amigos Casuais -->
  <circle cx="400" cy="420" r="200" fill="#c4a882" opacity="0.15" stroke="#c4a882" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Layer 2: 15 - Amigos Próximos -->
  <circle cx="400" cy="420" r="140" fill="#c4a882" opacity="0.22" stroke="#c4a882" stroke-width="1.5" stroke-opacity="0.4"/>

  <!-- Layer 1: 5 - Núcleo Íntimo -->
  <circle cx="400" cy="420" r="80" fill="#c4a882" opacity="0.35" stroke="#c4a882" stroke-width="2" stroke-opacity="0.6"/>

  <!-- Center dot (you) -->
  <circle cx="400" cy="420" r="8" fill="#c4a882"/>
  <text x="400" y="412" text-anchor="middle" class="label" font-size="9" fill="#8b7355" font-weight="600" opacity="0.7">VOCÊ</text>

  <!-- Layer labels (numbers - large, prominent) -->
  <!-- Layer 1: 5 -->
  <text x="400" y="442" text-anchor="middle" class="label" font-size="32" font-weight="800" fill="#8b7355" opacity="0.85">5</text>
  <text x="400" y="460" text-anchor="middle" class="label" font-size="11" font-weight="600" fill="#8b7355" opacity="0.7">Núcleo Íntimo</text>

  <!-- Layer 2: 15 -->
  <text x="400" y="530" text-anchor="middle" class="label" font-size="28" font-weight="800" fill="#9e8868" opacity="0.7">15</text>
  <text x="400" y="548" text-anchor="middle" class="label" font-size="10" font-weight="600" fill="#9e8868" opacity="0.6">Amigos Próximos</text>

  <!-- Layer 3: 50 -->
  <text x="400" y="596" text-anchor="middle" class="label" font-size="24" font-weight="800" fill="#c4a882" opacity="0.6">50</text>
  <text x="400" y="612" text-anchor="middle" class="label" font-size="10" font-weight="600" fill="#c4a882" opacity="0.5">Amigos Casuais</text>

  <!-- Layer 4: 150 -->
  <text x="400" y="666" text-anchor="middle" class="label" font-size="22" font-weight="800" fill="#d4bc9a" opacity="0.55">150</text>
  <text x="400" y="682" text-anchor="middle" class="label" font-size="10" font-weight="600" fill="#d4bc9a" opacity="0.45">Conhecidos Estáveis</text>

  <!-- Layer 5: 500 -->
  <text x="400" y="734" text-anchor="middle" class="label" font-size="20" font-weight="800" fill="#e0d5c5" opacity="0.5">500</text>
  <text x="400" y="750" text-anchor="middle" class="label" font-size="10" font-weight="600" fill="#e0d5c5" opacity="0.4">Rostos Conhecidos</text>

  <!-- x3 multiplier badges (between layers, on the right side) -->
  <!-- Between 5 and 15 -->
  <g transform="translate(510, 478)">
    <rect x="-20" y="-12" width="40" height="24" rx="12" fill="#c4a882" opacity="0.15"/>
    <text x="0" y="5" text-anchor="middle" class="label" font-size="13" font-weight="800" fill="#8b7355">x3</text>
  </g>
  <line x1="465" y1="470" x2="490" y2="475" stroke="#8b7355" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="510" y1="483" x2="485" y2="520" stroke="#8b7355" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- Between 15 and 50 -->
  <g transform="translate(545, 558)">
    <rect x="-20" y="-12" width="40" height="24" rx="12" fill="#c4a882" opacity="0.15"/>
    <text x="0" y="5" text-anchor="middle" class="label" font-size="13" font-weight="800" fill="#8b7355">x3</text>
  </g>
  <line x1="510" y1="543" x2="525" y2="550" stroke="#8b7355" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="545" y1="565" x2="530" y2="588" stroke="#8b7355" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- Between 50 and 150 -->
  <g transform="translate(575, 635)">
    <rect x="-20" y="-12" width="40" height="24" rx="12" fill="#c4a882" opacity="0.15"/>
    <text x="0" y="5" text-anchor="middle" class="label" font-size="13" font-weight="800" fill="#8b7355">x3</text>
  </g>
  <line x1="540" y1="612" x2="555" y2="625" stroke="#8b7355" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="575" y1="642" x2="560" y2="660" stroke="#8b7355" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- Between 150 and 500 -->
  <g transform="translate(598, 705)">
    <rect x="-22" y="-12" width="44" height="24" rx="12" fill="#c4a882" opacity="0.15"/>
    <text x="0" y="5" text-anchor="middle" class="label" font-size="13" font-weight="800" fill="#8b7355">x3.3</text>
  </g>
  <line x1="565" y1="682" x2="578" y2="695" stroke="#8b7355" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <line x1="598" y1="712" x2="580" y2="732" stroke="#8b7355" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>

  <!-- Left side annotation -->
  <g transform="translate(80, 350)">
    <text x="0" y="0" class="label" font-size="12" font-weight="700" fill="#1a1a1a" opacity="0.7">Robin Dunbar</text>
    <text x="0" y="18" class="label" font-size="11" fill="#666666">Oxford, 1992</text>
    <text x="0" y="40" class="label" font-size="10" fill="#666666" opacity="0.7">O neocórtex limita</text>
    <text x="0" y="54" class="label" font-size="10" fill="#666666" opacity="0.7">relações estáveis a ~150</text>
  </g>

  <!-- Bottom insight -->
  <rect x="220" y="775" width="360" height="1" rx="0.5" fill="#c4a882" opacity="0.15"/>
</svg>